<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para o Amor da Minha Vida 💖</title>

<style>
body{
    margin:0;
    padding:0;
    text-align:center;
    font-family: Arial;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    overflow:hidden;
}

button{
    padding:15px 25px;
    font-size:18px;
    background:hotpink;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#conteudo, #senhaArea, #surpresa{
    display:none;
    margin-top:30px;
}

img{
    width:300px;
    border-radius:15px;
}

.heart{
    position: fixed;
    top:-10px;
    font-size:20px;
    animation: cair 5s linear infinite;
}

@keyframes cair{
    0%{transform:translateY(0);}
    100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<h1>Clique se me ama 💖</h1>
<button onclick="iniciar()">Entrar</button>

<div id="conteudo">
    <div id="senhaArea">
        <h2>Digite a senha 🔐</h2>
        <input type="password" id="senha">
        <br><br>
        <button onclick="verificarSenha()">Confirmar</button>
    </div>

    <div id="surpresa">
        <h2>Feliz Aniversário, meu amor 😭❤️</h2>

        <img src="foto.jpg"> <!-- COLOQUE A FOTO DE VOCÊS AQUI -->

        <p>
        Você é a melhor parte da minha vida.<br><br>
        Desde o primeiro dia, meu coração é seu.<br>
        Que seu aniversário seja tão lindo quanto você.<br><br>
        Eu te amo infinitamente ❤️
        </p>
    </div>
</div>

<!-- ESPAÇO PARA A MÚSICA -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

function iniciar(){
    document.getElementById("conteudo").style.display = "block";
    document.getElementById("senhaArea").style.display = "block";
    document.getElementById("musica").play();
    criarCoracoes();
}

function verificarSenha(){
    var senha = document.getElementById("senha").value.trim();
    if(senha == "14/12/2024"){
        document.getElementById("surpresa").style.display = "block";
    } else {
        alert("Senha incorreta 😏");
    }
}

function criarCoracoes(){
    setInterval(function(){
        var heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random()*3+2) + "s";
        document.body.appendChild(heart);

        setTimeout(function(){
            heart.remove();
        },5000);

    },300);
}

</script>

</body>
</html>
